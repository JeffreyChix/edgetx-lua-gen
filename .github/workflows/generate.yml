name: Generate Stubs

on:
    push:
        branches: [main]
    schedule:
        - cron: "0 6 * * 1,4" # Monday and Thursday at 6am UTC
    workflow_dispatch:

jobs:
    generate:
        runs-on: ubuntu-latest

        permissions:
            contents: write # needed to commit stubs + manifest back

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run generator
              run: npx tsx src/index.ts --version all --withstubs
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  TRIGGER: ${{ github.event_name }}
                  NODE_ENV: production

            - name: Commit if changed
              run: |
                  git clone https://x-access-token:${{ secrets.STUBS_REPO_TOKEN }}@github.com/JeffreyChix/edgetx-stubs.git stubs-out
                  cp -r stubs/ stubs-out/
                  cp manifest.json stubs-out/
                  cd stubs-out
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add .
                  git diff --cached --quiet || git commit -m "chore: regenerate stubs"
                  git push
